<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 720" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, monospace">
  <!-- Averix · Developer Architecture: Planner → Tracker → Judge -->
  <defs>
    <linearGradient id="dbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="moduleFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <marker id="darrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34d399"/>
    </marker>
    <marker id="darrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
    <marker id="darrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a78bfa"/>
    </marker>
    <marker id="darrowMuted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1180" height="720" fill="url(#dbg)"/>

  <text x="40" y="44" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">Averix Agent Loop — Developer View</text>
  <text x="40" y="66" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8">cgx.agents.run_agent  ·  goal → Planner → Tracker → (capability + Judge)*  → SSE stream → React UI</text>

  <!-- UI side -->
  <g>
    <rect x="40" y="100" width="220" height="100" rx="12" fill="url(#moduleFill)" stroke="#38bdf8" stroke-width="2"/>
    <text x="60" y="124" font-size="13" font-weight="700" fill="#38bdf8">AgentPage.tsx</text>
    <text x="60" y="146" font-size="11" fill="#cbd5e1">POST /api/agent (goal, opts)</text>
    <text x="60" y="164" font-size="11" fill="#cbd5e1">EventSource &lt;- SSE</text>
    <text x="60" y="184" font-size="10" fill="#64748b">TaskRow {name, kind, status, elapsed}</text>
  </g>

  <!-- API / SSE bridge -->
  <g>
    <rect x="300" y="100" width="220" height="100" rx="12" fill="url(#moduleFill)" stroke="#94a3b8" stroke-width="2"/>
    <text x="320" y="124" font-size="13" font-weight="700" fill="#cbd5e1">cgx.api server</text>
    <text x="320" y="146" font-size="11" fill="#cbd5e1">SSE bridge (text/event-stream)</text>
    <text x="320" y="164" font-size="11" fill="#cbd5e1">AgentEvent → SSE event lines</text>
    <text x="320" y="184" font-size="10" fill="#64748b">heartbeat ping every ~15s</text>
  </g>

  <!-- run_agent -->
  <g>
    <rect x="560" y="100" width="220" height="100" rx="12" fill="url(#moduleFill)" stroke="#a78bfa" stroke-width="2"/>
    <text x="580" y="124" font-size="13" font-weight="700" fill="#a78bfa">cgx.agents.loop</text>
    <text x="580" y="146" font-size="11" fill="#cbd5e1">run_agent(goal, ..., stream=True)</text>
    <text x="580" y="164" font-size="11" fill="#cbd5e1">progress_interval=2.0s</text>
    <text x="580" y="184" font-size="10" fill="#64748b">wires Planner + Tracker + Judge</text>
  </g>

  <!-- arrows UI -->
  <line x1="260" y1="150" x2="298" y2="150" stroke="#34d399" stroke-width="2" marker-end="url(#darrow)"/>
  <line x1="520" y1="150" x2="558" y2="150" stroke="#34d399" stroke-width="2" marker-end="url(#darrow)"/>

  <!-- Planner -->
  <g>
    <rect x="40" y="240" width="320" height="160" rx="12" fill="url(#moduleFill)" stroke="#38bdf8" stroke-width="2"/>
    <text x="60" y="266" font-size="14" font-weight="700" fill="#38bdf8">Planner  ·  cgx.agents.planner</text>
    <text x="60" y="290" font-size="11" fill="#cbd5e1">LLM (strict JSON) or deterministic fallback</text>
    <text x="60" y="308" font-size="11" fill="#cbd5e1">Schema: {name, description, kind, criteria}</text>
    <text x="60" y="328" font-size="11" fill="#f59e0b">_enforce_kind_policy():</text>
    <text x="60" y="344" font-size="10.5" fill="#cbd5e1">  read-only goal ⇒ downgrade plan → ask</text>
    <text x="60" y="362" font-size="10.5" fill="#cbd5e1">  uses detect_intent + _CHANGE_VERB_RE</text>
    <text x="60" y="384" font-size="10" fill="#64748b">_derive_name(): short title from first sentence</text>
  </g>

  <!-- Tracker -->
  <g>
    <rect x="430" y="240" width="320" height="160" rx="12" fill="url(#moduleFill)" stroke="#34d399" stroke-width="2"/>
    <text x="450" y="266" font-size="14" font-weight="700" fill="#34d399">Tracker  ·  cgx.agents.tracker</text>
    <text x="450" y="290" font-size="11" fill="#cbd5e1">stream(plan) → Iterator[AgentEvent]</text>
    <text x="450" y="310" font-size="11" fill="#cbd5e1">capability runs in a worker thread</text>
    <text x="450" y="328" font-size="11" fill="#f59e0b">every progress_interval (2s default):</text>
    <text x="450" y="344" font-size="10.5" fill="#cbd5e1">  yield task_progress {task_id, elapsed}</text>
    <text x="450" y="364" font-size="10.5" fill="#cbd5e1">on done: judge → task_done / task_failed</text>
    <text x="450" y="384" font-size="10" fill="#64748b">stop_on_fail halts; otherwise skips downstream</text>
  </g>

  <!-- Judge -->
  <g>
    <rect x="820" y="240" width="320" height="160" rx="12" fill="url(#moduleFill)" stroke="#a78bfa" stroke-width="2"/>
    <text x="840" y="266" font-size="14" font-weight="700" fill="#a78bfa">Judge  ·  cgx.agents.judge</text>
    <text x="840" y="290" font-size="11" fill="#cbd5e1">Structural short-circuits first:</text>
    <text x="840" y="308" font-size="10.5" fill="#cbd5e1">  PLAN: needs fenced diff in plan_md</text>
    <text x="840" y="324" font-size="10.5" fill="#cbd5e1">  SEARCH: pass when hits &gt; 0 (skip LLM)</text>
    <text x="840" y="340" font-size="10.5" fill="#cbd5e1">  ASK: fail when answer empty</text>
    <text x="840" y="362" font-size="11" fill="#f59e0b">LLM verdict (when needed):</text>
    <text x="840" y="380" font-size="10.5" fill="#cbd5e1">  {verdict, confidence, rationale} JSON</text>
  </g>

  <!-- Flow arrows between Planner -> Tracker -> Judge -->
  <line x1="360" y1="320" x2="428" y2="320" stroke="#34d399" stroke-width="2" marker-end="url(#darrow)"/>
  <line x1="750" y1="320" x2="818" y2="320" stroke="#a78bfa" stroke-width="2" marker-end="url(#darrowPurple)"/>
  <line x1="980" y1="400" x2="980" y2="430" stroke="#a78bfa" stroke-width="2" marker-end="url(#darrowPurple)"/>
  <line x1="980" y1="430" x2="590" y2="430" stroke="#a78bfa" stroke-width="2" stroke-dasharray="6 4"/>
  <line x1="590" y1="430" x2="590" y2="400" stroke="#a78bfa" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#darrowPurple)"/>
  <text x="700" y="448" font-size="10" fill="#a78bfa" font-family="Inter, sans-serif">verdict feeds next task</text>

  <!-- Capabilities row -->
  <text x="40" y="490" font-size="13" font-weight="700" fill="#cbd5e1" font-family="Inter, sans-serif">Capabilities (dispatched by task.kind)</text>
  <line x1="40" y1="500" x2="1140" y2="500" stroke="#1e293b"/>
  <g>
    <rect x="40"  y="520" width="260" height="80" rx="10" fill="#0b1220" stroke="#34d399" stroke-opacity="0.6"/>
    <text x="58" y="544" font-size="12" font-weight="700" fill="#34d399">search</text>
    <text x="58" y="564" font-size="10.5" fill="#cbd5e1">cgx.pipeline.auto.run_query_auto</text>
    <text x="58" y="582" font-size="10" fill="#64748b">→ {hits, top_files, impact}</text>
  </g>
  <g>
    <rect x="320" y="520" width="260" height="80" rx="10" fill="#0b1220" stroke="#38bdf8" stroke-opacity="0.6"/>
    <text x="338" y="544" font-size="12" font-weight="700" fill="#38bdf8">ask</text>
    <text x="338" y="564" font-size="10.5" fill="#cbd5e1">cgx.answer.engine.answer_with_llm</text>
    <text x="338" y="582" font-size="10" fill="#64748b">→ {answer_md, citations}</text>
  </g>
  <g>
    <rect x="600" y="520" width="260" height="80" rx="10" fill="#0b1220" stroke="#f59e0b" stroke-opacity="0.6"/>
    <text x="618" y="544" font-size="12" font-weight="700" fill="#f59e0b">plan</text>
    <text x="618" y="564" font-size="10.5" fill="#cbd5e1">cgx.answer.engine.generate_code_plan</text>
    <text x="618" y="582" font-size="10" fill="#64748b">→ {plan_md, diffs, codegen_report}</text>
  </g>
  <g>
    <rect x="880" y="520" width="260" height="80" rx="10" fill="#0b1220" stroke="#a78bfa" stroke-opacity="0.6"/>
    <text x="898" y="544" font-size="12" font-weight="700" fill="#a78bfa">summarize</text>
    <text x="898" y="564" font-size="10.5" fill="#cbd5e1">LLM over prior task outputs</text>
    <text x="898" y="582" font-size="10" fill="#64748b">→ {answer_md}</text>
  </g>

  <!-- Event timeline -->
  <text x="40" y="635" font-size="13" font-weight="700" fill="#cbd5e1" font-family="Inter, sans-serif">SSE event stream (per task)</text>
  <line x1="40" y1="645" x2="1140" y2="645" stroke="#1e293b"/>
  <g font-size="11" font-family="JetBrains Mono, monospace">
    <rect x="40"  y="665" width="100" height="30" rx="6" fill="#0b1220" stroke="#38bdf8"/>
    <text x="90" y="685" text-anchor="middle" fill="#38bdf8">plan</text>
    <rect x="170" y="665" width="120" height="30" rx="6" fill="#0b1220" stroke="#34d399"/>
    <text x="230" y="685" text-anchor="middle" fill="#34d399">task_start</text>
    <rect x="320" y="665" width="160" height="30" rx="6" fill="#0b1220" stroke="#f59e0b"/>
    <text x="400" y="685" text-anchor="middle" fill="#f59e0b">task_progress · Nx</text>
    <rect x="510" y="665" width="100" height="30" rx="6" fill="#0b1220" stroke="#a78bfa"/>
    <text x="560" y="685" text-anchor="middle" fill="#a78bfa">judge</text>
    <rect x="640" y="665" width="120" height="30" rx="6" fill="#0b1220" stroke="#34d399"/>
    <text x="700" y="685" text-anchor="middle" fill="#34d399">task_done</text>
    <rect x="790" y="665" width="120" height="30" rx="6" fill="#0b1220" stroke="#f87171"/>
    <text x="850" y="685" text-anchor="middle" fill="#f87171">task_failed?</text>
    <rect x="940" y="665" width="100" height="30" rx="6" fill="#0b1220" stroke="#a78bfa"/>
    <text x="990" y="685" text-anchor="middle" fill="#a78bfa">summary</text>
    <line x1="140" y1="680" x2="168" y2="680" stroke="#475569" stroke-width="1.5" marker-end="url(#darrowMuted)"/>
    <line x1="290" y1="680" x2="318" y2="680" stroke="#475569" stroke-width="1.5" marker-end="url(#darrowMuted)"/>
    <line x1="480" y1="680" x2="508" y2="680" stroke="#475569" stroke-width="1.5" marker-end="url(#darrowMuted)"/>
    <line x1="610" y1="680" x2="638" y2="680" stroke="#475569" stroke-width="1.5" marker-end="url(#darrowMuted)"/>
    <line x1="760" y1="680" x2="788" y2="680" stroke="#475569" stroke-width="1.5" marker-end="url(#darrowMuted)"/>
    <line x1="910" y1="680" x2="938" y2="680" stroke="#475569" stroke-width="1.5" marker-end="url(#darrowMuted)"/>
  </g>
</svg>
