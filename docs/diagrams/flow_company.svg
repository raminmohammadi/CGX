<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 620" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif">
  <!-- Averix · Company / Security view -->
  <defs>
    <linearGradient id="cbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="zoneLocal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#022c22"/>
      <stop offset="100%" stop-color="#011a14"/>
    </linearGradient>
    <linearGradient id="zoneCloud" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0b0a25"/>
    </linearGradient>
    <marker id="carrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34d399"/>
    </marker>
    <marker id="carrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect width="1080" height="620" fill="url(#cbg)"/>

  <text x="40" y="44" font-size="22" font-weight="700" fill="#f1f5f9">Averix — Trust &amp; Data Boundaries</text>
  <text x="40" y="66" font-size="12.5" fill="#94a3b8">What stays on the machine, what (optionally) leaves, and where secrets live.</text>

  <!-- Local zone -->
  <g>
    <rect x="40" y="100" width="660" height="480" rx="18" fill="url(#zoneLocal)" stroke="#10b981" stroke-width="2"/>
    <text x="60" y="128" font-size="14" font-weight="700" fill="#a7f3d0">🔒  LOCAL MACHINE  ·  no network required</text>
    <text x="60" y="146" font-size="11" fill="#6ee7b7">Source code, embeddings, FAISS indices, sessions, telemetry, and cache never leave this box.</text>

    <!-- Repo -->
    <g>
      <rect x="60" y="170" width="180" height="80" rx="10" fill="#0b1220" stroke="#10b981" stroke-opacity="0.7"/>
      <text x="78" y="195" font-size="12" font-weight="700" fill="#a7f3d0">📁 Your repository</text>
      <text x="78" y="216" font-size="10.5" fill="#cbd5e1">read-only ingest</text>
      <text x="78" y="232" font-size="10.5" fill="#94a3b8">respects .gitignore, 1 MB cap</text>
    </g>

    <!-- Indexer -->
    <g>
      <rect x="260" y="170" width="180" height="80" rx="10" fill="#0b1220" stroke="#10b981" stroke-opacity="0.7"/>
      <text x="278" y="195" font-size="12" font-weight="700" fill="#a7f3d0">⚙️ Indexer</text>
      <text x="278" y="216" font-size="10.5" fill="#cbd5e1">cgx.pipeline.auto</text>
      <text x="278" y="232" font-size="10.5" fill="#94a3b8">chunks · graph · embeddings</text>
    </g>

    <!-- On-disk artifacts -->
    <g>
      <rect x="460" y="170" width="220" height="80" rx="10" fill="#0b1220" stroke="#10b981" stroke-opacity="0.7"/>
      <text x="478" y="195" font-size="12" font-weight="700" fill="#a7f3d0">💾 On-disk artefacts</text>
      <text x="478" y="216" font-size="10.5" fill="#cbd5e1">indices/  records.jsonl  graph.json</text>
      <text x="478" y="232" font-size="10.5" fill="#94a3b8">emb_cache_*.npz  (content-addressed)</text>
    </g>

    <!-- Agent loop -->
    <g>
      <rect x="60" y="280" width="620" height="100" rx="10" fill="#0b1220" stroke="#10b981" stroke-opacity="0.7"/>
      <text x="78" y="305" font-size="12" font-weight="700" fill="#a7f3d0">🤖 Agent loop  ·  Planner → Tracker → Judge</text>
      <text x="78" y="326" font-size="10.5" fill="#cbd5e1">Decomposes a goal into 1–5 atomic tasks; dispatches search / ask / plan / summarize.</text>
      <text x="78" y="344" font-size="10.5" fill="#cbd5e1">Self-tests code diffs in a sandboxed copy (AST parse + scoped pytest) before surfacing them.</text>
      <text x="78" y="362" font-size="10.5" fill="#94a3b8">SSE event stream stays inside the local process; UI subscribes over localhost.</text>
    </g>

    <!-- Sessions + secrets -->
    <g>
      <rect x="60" y="410" width="300" height="140" rx="10" fill="#0b1220" stroke="#10b981" stroke-opacity="0.7"/>
      <text x="78" y="435" font-size="12" font-weight="700" fill="#a7f3d0">💬 Sessions &amp; cache</text>
      <text x="78" y="455" font-size="10.5" fill="#cbd5e1">~/.cgx/sessions/*.jsonl  (chat history)</text>
      <text x="78" y="473" font-size="10.5" fill="#cbd5e1">~/.cgx/profiles.json  (provider config)</text>
      <text x="78" y="491" font-size="10.5" fill="#cbd5e1">embedding cache  ·  rerank weights</text>
      <text x="78" y="513" font-size="10" fill="#6ee7b7">No telemetry or analytics dialled home.</text>
      <text x="78" y="529" font-size="10" fill="#6ee7b7">Delete a session = delete a file.</text>
    </g>

    <g>
      <rect x="380" y="410" width="300" height="140" rx="10" fill="#0b1220" stroke="#10b981" stroke-opacity="0.7"/>
      <text x="398" y="435" font-size="12" font-weight="700" fill="#a7f3d0">🔑 Credentials</text>
      <text x="398" y="455" font-size="10.5" fill="#cbd5e1">API keys → OS keyring when available</text>
      <text x="398" y="473" font-size="10.5" fill="#cbd5e1">Fallback: ~/.cgx/secrets.json  (mode 0600)</text>
      <text x="398" y="491" font-size="10.5" fill="#cbd5e1">Per-profile rate limit + retry budget</text>
      <text x="398" y="513" font-size="10" fill="#6ee7b7">Never logged, never echoed to UI events.</text>
      <text x="398" y="529" font-size="10" fill="#6ee7b7">Never sent as tool-call arguments.</text>
    </g>
  </g>

  <!-- Optional cloud zone -->
  <g>
    <rect x="740" y="100" width="300" height="480" rx="18" fill="url(#zoneCloud)" stroke="#a78bfa" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="760" y="128" font-size="14" font-weight="700" fill="#c4b5fd">☁️  OPTIONAL CLOUD</text>
    <text x="760" y="146" font-size="11" fill="#a5b4fc">Only used if you point a profile at an OpenAI-compatible endpoint.</text>

    <g>
      <rect x="760" y="170" width="260" height="100" rx="10" fill="#0b1220" stroke="#a78bfa" stroke-opacity="0.6"/>
      <text x="778" y="195" font-size="12" font-weight="700" fill="#c4b5fd">🧠 Local LLM (default)</text>
      <text x="778" y="216" font-size="10.5" fill="#cbd5e1">Ollama on 127.0.0.1:11434</text>
      <text x="778" y="234" font-size="10.5" fill="#cbd5e1">qwen2.5-coder:3b, llama3, etc.</text>
      <text x="778" y="254" font-size="10" fill="#6ee7b7">Fully offline · zero egress.</text>
    </g>

    <g>
      <rect x="760" y="290" width="260" height="120" rx="10" fill="#0b1220" stroke="#a78bfa" stroke-opacity="0.6" stroke-dasharray="4 3"/>
      <text x="778" y="315" font-size="12" font-weight="700" fill="#c4b5fd">🌐 Remote LLM (opt-in)</text>
      <text x="778" y="336" font-size="10.5" fill="#cbd5e1">Any OpenAI-compatible URL</text>
      <text x="778" y="354" font-size="10.5" fill="#cbd5e1">Sent: prompt + retrieved snippets</text>
      <text x="778" y="372" font-size="10.5" fill="#f59e0b">NOT sent: full repo, indices, sessions</text>
      <text x="778" y="392" font-size="10" fill="#94a3b8">Subject to provider's data policy.</text>
    </g>

    <g>
      <rect x="760" y="430" width="260" height="120" rx="10" fill="#0b1220" stroke="#a78bfa" stroke-opacity="0.6"/>
      <text x="778" y="455" font-size="12" font-weight="700" fill="#c4b5fd">🛡 Hardening defaults</text>
      <text x="778" y="475" font-size="10.5" fill="#cbd5e1">Client-side rate limit + 429 retry</text>
      <text x="778" y="493" font-size="10.5" fill="#cbd5e1">Profile-scoped per-call budgets</text>
      <text x="778" y="511" font-size="10.5" fill="#cbd5e1">No headers / cookies in event log</text>
      <text x="778" y="531" font-size="10" fill="#6ee7b7">Air-gap = disable the cloud profile.</text>
    </g>
  </g>

  <!-- Crossing arrow (opt-in egress) -->
  <line x1="680" y1="330" x2="758" y2="330" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#carrowAmber)"/>
  <text x="690" y="322" font-size="10" fill="#f59e0b">opt-in egress</text>
</svg>
