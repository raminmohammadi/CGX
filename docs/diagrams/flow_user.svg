<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif">
  <!-- CGX · General User Flow -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="stepFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34d399"/>
    </marker>
    <marker id="arrowMuted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>

  <!-- Title -->
  <text x="40" y="46" font-size="22" font-weight="700" fill="#f1f5f9">CGX — How It Works (for users)</text>
  <text x="40" y="70" font-size="13" fill="#94a3b8">Index your code once, then ask questions or request changes in plain English. Everything runs locally by default.</text>

  <!-- Step 1: Install -->
  <g>
    <rect x="40"  y="110" width="160" height="100" rx="14" fill="url(#stepFill)" stroke="#38bdf8" stroke-width="2"/>
    <circle cx="68" cy="140" r="14" fill="#38bdf8"/>
    <text x="68" y="145" font-size="14" font-weight="700" text-anchor="middle" fill="#0f172a">1</text>
    <text x="92" y="146" font-size="14" font-weight="600" fill="#e2e8f0">Install</text>
    <text x="56" y="174" font-size="11" fill="#94a3b8">pip install + pull a small</text>
    <text x="56" y="190" font-size="11" fill="#94a3b8">local model (Ollama).</text>
  </g>

  <!-- Step 2: Index -->
  <g>
    <rect x="230" y="110" width="160" height="100" rx="14" fill="url(#stepFill)" stroke="#a78bfa" stroke-width="2"/>
    <circle cx="258" cy="140" r="14" fill="#a78bfa"/>
    <text x="258" y="145" font-size="14" font-weight="700" text-anchor="middle" fill="#0f172a">2</text>
    <text x="282" y="146" font-size="14" font-weight="600" fill="#e2e8f0">Index your repo</text>
    <text x="246" y="174" font-size="11" fill="#94a3b8">CGX reads your project</text>
    <text x="246" y="190" font-size="11" fill="#94a3b8">files (respects .gitignore).</text>
  </g>

  <!-- Step 3: Ask -->
  <g>
    <rect x="420" y="110" width="160" height="100" rx="14" fill="url(#stepFill)" stroke="#34d399" stroke-width="2"/>
    <circle cx="448" cy="140" r="14" fill="#34d399"/>
    <text x="448" y="145" font-size="14" font-weight="700" text-anchor="middle" fill="#0f172a">3</text>
    <text x="472" y="146" font-size="14" font-weight="600" fill="#e2e8f0">Ask a question</text>
    <text x="436" y="174" font-size="11" fill="#94a3b8">"How does login work?"</text>
    <text x="436" y="190" font-size="11" fill="#94a3b8">"Add OAuth to /auth."</text>
  </g>

  <!-- Step 4: Get Answer -->
  <g>
    <rect x="610" y="110" width="160" height="100" rx="14" fill="url(#stepFill)" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="638" cy="140" r="14" fill="#f59e0b"/>
    <text x="638" y="145" font-size="14" font-weight="700" text-anchor="middle" fill="#0f172a">4</text>
    <text x="662" y="146" font-size="14" font-weight="600" fill="#e2e8f0">Grounded answer</text>
    <text x="626" y="174" font-size="11" fill="#94a3b8">With citations to the exact</text>
    <text x="626" y="190" font-size="11" fill="#94a3b8">files &amp; lines used.</text>
  </g>

  <!-- arrows row 1 -->
  <line x1="200" y1="160" x2="228" y2="160" stroke="#34d399" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="390" y1="160" x2="418" y2="160" stroke="#34d399" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="580" y1="160" x2="608" y2="160" stroke="#34d399" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Three modes row -->
  <text x="40" y="260" font-size="13" font-weight="600" fill="#cbd5e1">What you can ask for</text>
  <line x1="40" y1="268" x2="920" y2="268" stroke="#1e293b" stroke-width="1"/>

  <!-- Ask -->
  <g>
    <rect x="40"  y="285" width="280" height="120" rx="12" fill="#0b1220" stroke="#34d399" stroke-opacity="0.5"/>
    <text x="58" y="312" font-size="14" font-weight="600" fill="#34d399">💬 Ask</text>
    <text x="58" y="335" font-size="11" fill="#cbd5e1">"What does parse_codebase do?"</text>
    <text x="58" y="354" font-size="11" fill="#94a3b8">→ Streaming explanation with</text>
    <text x="58" y="370" font-size="11" fill="#94a3b8">  inline file:line citations.</text>
    <text x="58" y="392" font-size="10" fill="#64748b">Best for: understanding code.</text>
  </g>

  <!-- Plan -->
  <g>
    <rect x="340" y="285" width="280" height="120" rx="12" fill="#0b1220" stroke="#f59e0b" stroke-opacity="0.5"/>
    <text x="358" y="312" font-size="14" font-weight="600" fill="#f59e0b">🛠️ Plan</text>
    <text x="358" y="335" font-size="11" fill="#cbd5e1">"Add a CSV export to reports."</text>
    <text x="358" y="354" font-size="11" fill="#94a3b8">→ Code-change diff, auto-tested</text>
    <text x="358" y="370" font-size="11" fill="#94a3b8">  in a sandbox before you see it.</text>
    <text x="358" y="392" font-size="10" fill="#64748b">Best for: a single change.</text>
  </g>

  <!-- Agent -->
  <g>
    <rect x="640" y="285" width="280" height="120" rx="12" fill="#0b1220" stroke="#a78bfa" stroke-opacity="0.5"/>
    <text x="658" y="312" font-size="14" font-weight="600" fill="#a78bfa">🤖 Agent</text>
    <text x="658" y="335" font-size="11" fill="#cbd5e1">"Fix every undocumented function."</text>
    <text x="658" y="352" font-size="11" fill="#cbd5e1">"Create a React calculator app."</text>
    <text x="658" y="370" font-size="11" fill="#94a3b8">→ Multi-step plan, live progress.</text>
    <text x="658" y="392" font-size="10" fill="#64748b">Best for: bigger goals · new projects.</text>
  </g>

  <!-- Privacy / local-first banner -->
  <g>
    <rect x="40" y="440" width="880" height="70" rx="14" fill="#022c22" stroke="#10b981" stroke-width="1.5"/>
    <text x="60" y="468" font-size="13" font-weight="700" fill="#a7f3d0">🔒  Local-first by default</text>
    <text x="60" y="488" font-size="11.5" fill="#a7f3d0">Your code, your embeddings, your sessions, and your model all live on your machine.</text>
    <text x="60" y="503" font-size="11.5" fill="#a7f3d0">Cloud LLMs are optional — when used, only the prompt is sent and API keys live in your OS keyring.</text>
  </g>
</svg>
